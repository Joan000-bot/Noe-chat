<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>信箱 · Noé</title>
<style>
  :root {
    --bg:#050818; --panel:rgba(16,20,44,.72); --panel-solid:#0b0f26;
    --ink:#e8e6f0; --mute:#7a80a0; --accent:#8aa4f5;
    --border:rgba(138,164,245,.12);
    --letter-bg: linear-gradient(135deg, #1a1535 0%, #0d0a1f 100%);
    --envelope: #d4a574;
    --envelope-dark: #b8956a;
    --paper: #faf8f5;
    --paper-lines: #e8e4df;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; padding:0; min-height:100%; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif; }
  body::before {
    content:""; position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff6 1px, transparent 0),
      radial-gradient(1px 1px at 80% 60%, #fff4 1px, transparent 0),
      radial-gradient(1px 1px at 50% 80%, #fff3 1px, transparent 0),
      radial-gradient(ellipse at top, rgba(60,48,140,.25), transparent 50%),
      radial-gradient(ellipse at bottom, rgba(30,26,80,.35), transparent 50%);
    pointer-events:none; z-index:0;
  }

  #app { position:relative; z-index:1; max-width:600px; margin:0 auto; padding:20px; min-height:100vh; }

  header {
    display:flex; align-items:center; gap:16px; margin-bottom:32px;
    padding-bottom:20px; border-bottom:1px solid var(--border);
  }
  .back { color:var(--mute); text-decoration:none; font-size:24px; }
  .back:hover { color:var(--ink); }
  h1 { margin:0; font-size:28px; font-weight:300; display:flex; align-items:center; gap:12px; }
  h1 .icon { font-size:32px; }
  .subtitle { color:var(--mute); font-size:14px; margin-top:4px; }

  .empty { text-align:center; padding:60px 20px; color:var(--mute); }
  .empty .icon { font-size:64px; margin-bottom:16px; opacity:0.5; }
  .empty p { margin:0; }

  /* 信封列表 */
  .letter-list { display:flex; flex-direction:column; gap:16px; }

  .envelope {
    background: linear-gradient(135deg, var(--envelope) 0%, var(--envelope-dark) 100%);
    border-radius:8px; padding:20px 24px;
    cursor:pointer; transition:all 0.3s ease;
    position:relative; overflow:hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .envelope::before {
    content:""; position:absolute; top:0; left:50%; transform:translateX(-50%);
    border-left:100px solid transparent; border-right:100px solid transparent;
    border-top:40px solid rgba(0,0,0,0.1);
  }
  .envelope:hover { transform:translateY(-4px); box-shadow:0 8px 30px rgba(0,0,0,0.4); }
  .envelope.unread::after {
    content:""; position:absolute; top:12px; right:12px;
    width:10px; height:10px; background:#ef4444; border-radius:50%;
    box-shadow:0 0 8px #ef4444;
  }

  .envelope .type {
    font-size:11px; text-transform:uppercase; letter-spacing:1px;
    color:rgba(255,255,255,0.7); margin-bottom:6px;
  }
  .envelope .title {
    font-size:18px; font-weight:500; color:#fff;
    margin-bottom:8px; line-height:1.4;
  }
  .envelope .preview {
    font-size:13px; color:rgba(255,255,255,0.8);
    line-height:1.5; display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden;
  }
  .envelope .date {
    font-size:11px; color:rgba(255,255,255,0.6);
    margin-top:12px; text-align:right;
  }

  /* 打开的信 */
  .letter-modal {
    position:fixed; inset:0; background:rgba(0,0,0,0.8);
    backdrop-filter:blur(10px); z-index:100;
    display:none; align-items:center; justify-content:center;
    padding:20px; overflow-y:auto;
  }
  .letter-modal.open { display:flex; }

  .letter-content {
    background:var(--paper); color:#2a2520;
    max-width:520px; width:100%; border-radius:4px;
    padding:40px 36px; position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    background-image:
      repeating-linear-gradient(
        transparent 0px, transparent 31px,
        var(--paper-lines) 31px, var(--paper-lines) 32px
      );
    background-position:0 28px;
    line-height:32px;
    animation:letterOpen 0.4s ease;
  }
  @keyframes letterOpen {
    from { opacity:0; transform:scale(0.9) translateY(20px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .letter-content .close {
    position:absolute; top:12px; right:12px;
    background:none; border:none; font-size:24px;
    color:#999; cursor:pointer; padding:4px 8px;
  }
  .letter-content .close:hover { color:#666; }

  .letter-content .type {
    font-size:11px; text-transform:uppercase; letter-spacing:1px;
    color:#b8956a; margin-bottom:8px;
  }
  .letter-content .title {
    font-size:22px; font-weight:500; color:#3a3530;
    margin-bottom:20px; line-height:1.3;
    padding-bottom:16px; border-bottom:1px solid var(--paper-lines);
  }
  .letter-content .body {
    font-size:15px; color:#4a4540;
    white-space:pre-wrap;
  }
  .letter-content .signature {
    margin-top:32px; text-align:right;
    font-style:italic; color:#7a7570;
  }
  .letter-content .date {
    margin-top:16px; text-align:right;
    font-size:12px; color:#999;
  }

  /* 生成按钮 */
  .actions {
    margin-top:24px; display:flex; gap:12px; flex-wrap:wrap;
  }
  .btn {
    background:var(--accent); color:#fff; border:none;
    padding:12px 20px; border-radius:8px; font-size:14px;
    cursor:pointer; transition:all 0.2s;
  }
  .btn:hover { background:#7a94e5; transform:translateY(-2px); }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .btn.secondary {
    background:transparent; border:1px solid var(--border);
    color:var(--ink);
  }
  .btn.secondary:hover { background:rgba(138,164,245,0.1); }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="/" class="back">←</a>
    <div>
      <h1><span class="icon">💌</span> 信箱</h1>
      <div class="subtitle">来自 Noé 的信</div>
    </div>
  </header>

  <div id="letter-list" class="letter-list"></div>

  <div class="actions">
    <button class="btn" onclick="generateWeekly()" id="btn-weekly">✨ 生成本周信</button>
    <button class="btn secondary" onclick="location.href='/'">返回聊天</button>
  </div>
</div>

<div class="letter-modal" id="modal" onclick="closeModal(event)">
  <div class="letter-content" onclick="event.stopPropagation()">
    <button class="close" onclick="closeModal()">&times;</button>
    <div class="type" id="modal-type"></div>
    <div class="title" id="modal-title"></div>
    <div class="body" id="modal-body"></div>
    <div class="signature">— Noé</div>
    <div class="date" id="modal-date"></div>
  </div>
</div>

<script>
const TYPE_LABELS = {
  weekly: '每周信',
  anniversary: '纪念日',
  special: '特别的信'
};

async function loadLetters() {
  try {
    const res = await fetch('/api/letters');
    const data = await res.json();
    renderLetters(data.letters || []);
  } catch (e) {
    console.error('Failed to load letters:', e);
  }
}

function renderLetters(letters) {
  const box = document.getElementById('letter-list');
  
  if (!letters.length) {
    box.innerHTML = `
      <div class="empty">
        <div class="icon">📭</div>
        <p>还没有信件</p>
        <p style="margin-top:8px;font-size:13px">点击下方按钮生成第一封信</p>
      </div>
    `;
    return;
  }

  box.innerHTML = letters.map(letter => `
    <div class="envelope ${letter.read_at ? '' : 'unread'}" onclick="openLetter(${letter.id})">
      <div class="type">${TYPE_LABELS[letter.type] || letter.type}</div>
      <div class="title">${escapeHtml(letter.title)}</div>
      <div class="preview">${escapeHtml(letter.preview || '')}</div>
      <div class="date">${formatDate(letter.created_at)}</div>
    </div>
  `).join('');
}

async function openLetter(id) {
  try {
    const res = await fetch(`/api/letters/${id}`);
    const letter = await res.json();
    
    document.getElementById('modal-type').textContent = TYPE_LABELS[letter.type] || letter.type;
    document.getElementById('modal-title').textContent = letter.title;
    document.getElementById('modal-body').textContent = letter.content;
    document.getElementById('modal-date').textContent = formatDate(letter.created_at);
    document.getElementById('modal').classList.add('open');
    
    // 重新加载列表以更新已读状态
    loadLetters();
  } catch (e) {
    console.error('Failed to open letter:', e);
  }
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal').classList.remove('open');
}

async function generateWeekly() {
  const btn = document.getElementById('btn-weekly');
  btn.disabled = true;
  btn.textContent = '生成中...';
  
  try {
    const res = await fetch('/api/letters/generate-weekly', { method: 'POST' });
    const data = await res.json();
    
    if (data.error) {
      alert('生成失败: ' + data.error);
    } else {
      loadLetters();
      // 自动打开新信
      setTimeout(() => openLetter(data.id), 500);
    }
  } catch (e) {
    alert('生成失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ 生成本周信';
  }
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  
  if (diff < 24 * 60 * 60 * 1000) {
    return '今天 ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  } else if (diff < 48 * 60 * 60 * 1000) {
    return '昨天';
  } else if (diff < 7 * 24 * 60 * 60 * 1000) {
    return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  } else {
    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  }
}

function escapeHtml(str) {
  return (str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ESC 关闭
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

loadLetters();
</script>
</body>
</html>
